name: Garmin to Google Sheets Sync

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12 PM UTC (2 AM Hawaii)
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # Match your local version for token compatibility
      
      - name: Restore Garmin Session
        run: |
          mkdir -p ~/.garth
          echo "${{ secrets.GARMIN_TOKENS_BASE64 }}" | base64 --decode > garmin_tokens.zip
          # Junk the paths (-j) to ignore the Windows folder structure
          unzip -j garmin_tokens.zip -d ~/.garth/ || true
          # List the files to verify they are in the right spot
          ls ~/.garth
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run sync script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sync_garmin.py